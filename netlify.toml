[build]
  command = "npm run build"
  publish = "build"

# Redirect all routes to index.html (for SPA routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Disable caching for all JS files (including in subfolders)
[[headers]]
  for = "/**/*.js"
  [headers.values]
    Cache-Control = "no-store"

# Disable caching for all CSS files (including in subfolders)
[[headers]]
  for = "/**/*.css"
  [headers.values]
    Cache-Control = "no-store"

# Disable caching for the root HTML page
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"
